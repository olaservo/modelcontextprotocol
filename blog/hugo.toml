baseURL = 'https://blog.modelcontextprotocol.io/'
languageCode = 'en-us'
title = 'Model Context Protocol Blog'
copyright = 'Copyright © 2025 Model Context Protocol Project. All rights reserved.'
enableGitInfo = true
enableRobotsTXT = true
theme = 'github.com/adityatelange/hugo-PaperMod'
[pagination]
  pagerSize = 5

[params]
  author = "The MCP project"
  description = "Updates from the Model Context Protocol project"
  images = ["og-image.png"]

  # PaperMod specific settings
  # defaultTheme = "dark" # MCP uses a dark theme
  disableThemeToggle = false
  ShowShareButtons = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = false
  disableSpecial1stPost = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  ShowFullTextinRSS = true

  # Sub-tables must come after all scalar keys in TOML. Everything between
  # [params.homeInfoParams] and the next [section] belongs to the sub-table.
  [params.homeInfoParams]
    Content = "Get the latest updates from protocol maintainers and contributors about new developments, upcoming features, and real-world MCP implementations."

  [params.assets]
    favicon = "favicon.svg"
    favicon16x16 = "favicon.svg"
    favicon32x32 = "favicon.svg"
    apple_touch_icon = "favicon.svg"
    safari_pinned_tab = "favicon.svg"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/modelcontextprotocol"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/company/modelcontextprotocol"

# Menu configuration
[[menu.main]]
  identifier = "docs"
  name = "Documentation"
  url = "https://modelcontextprotocol.io/docs"
  weight = 10

# Markup configuration for syntax highlighting
[markup]
  [markup.highlight]
    guessSyntax = true
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Derive .Lastmod from git commit history (enableGitInfo) so JSON-LD
# dateModified reflects actual edits, not just frontmatter.
[frontmatter]
  lastmod = [':git', 'lastmod', 'date', 'publishDate']

[module]
  [[module.imports]]
    path = 'github.com/adityatelange/hugo-PaperMod'
